    <main class="home">
        <section>
            <h1>Creative Writing Practice App</h1>
            <p>A simple app made with the intention of helping people improve, or just indulge, in creative writing.</p>
        </section>

        <section>
            <div id="new_story">
                <button id="new_story_button">
                    <span>New Story</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
	                    <path d="M0 0h24v24H0z" fill="none" />
	                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15V5a2 2 0 0 0-2-2h-7m9 12v.172a2 2 0 0 1-.586 1.414l-3.828 3.828a2 2 0 0 1-1.414.586H15m6-6h-4a2 2 0 0 0-2 2v4m0 0H5a2 2 0 0 1-2-2v-7m10-5h4m-7 4h7M7 15h4M6 3v3m0 3V6m0 0h3M6 6H3" />
                    </svg>
                </button>
            </div>

            <div id="new_story_panel" class="new_story_panel" hidden>
                <div id="new_story_panel_content">

                    <div class="field">
                        <label for="story_title">Title</label>
                        <input type="text" id="story_title" value="Untitled" maxlength="64"/>
                    </div>

                    <div class="field">
                        <label for="story_type_group">Mode</label>
                        <div class="story_type_group">
                            <button class="story_type active" id="solo_story">Solo</button>
                            <button class="story_type" id="collaborative_story">Collaborative</button>
                        </div>
                        <label id="username_label" for="username" hidden>Username</label>
                        <input type="text" id="username" name="username" required minlength="1" maxlength="64" hidden/>
                    </div>

                    <div class="field">
                        <label for="genre_select">Genre</label>
                        <select id="genre_select">
                            <option value="">None</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="prompt_type">Prompt</label>
                        <select id="prompt_type">
                            <option value="none">None</option>
                            <option value="template">Template</option>
                            <option value="challenge">Challenge</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button id="cancel_new_story">Cancel</button>
                        <button id="create_new_story">Create</button>
                    </div>
                </div>
            </div>
        </section>

        <div id="join_panel" class="join_panel" hidden>
            <div id="join_panel_content">

                <div class="field">
                    <label id="join_username_label" for="join_username">Username</label>
                    <input type="text" id="join_username" name="join_username" required minlength="1" maxlength="64"/>
                </div>

                <div class="actions">
                    <button id="cancel_join">Cancel</button>
                    <button id="confirm_join">Join</button>
                </div>
            </div>
        </div>

        <section>
            <h3>Your Stories</h3>
            <ul id="stories_list"></ul>
        </section>

        <section>
            <h3>Collaborative Stories</h3>
            <ul id="sessions_list"></ul>
        </section>
    </main>

    <script src="scripts/ui.js"></script>
    <script type="module" src="scripts/home.js"></script>

</html>
