<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title"></title>
    <link rel="stylesheet" href="css/story_editor.css">
</head>
<body>
    <div id="sidebar">
        <button id="theme_toggle">
            <svg width="18" height="18" viewBox="0 0 24 18" aria-hidden="true">
                <path fill="currentColor" d="M12 2C6.48 2 2 6.02 2 10.5C2 13.54 4.09 16.09 7 17.2V19a3 3 0 0 0 3 3h1c.83 0 1.5-.67 1.5-1.5c0-.39-.15-.74-.39-1a1.4 1.4 0 0 1-.11-1.48c.27-.52.81-.82 1.39-.82H14c4.42 0 8-3.13 8-7C22 5.03 17.52 2 12 2Zm-5 9c-.83 0-1.5-.67-1.5-1.5S6.17 8 7 8s1.5.67 1.5 1.5S7.83 11 7 11Zm3-3c-.83 0-1.5-.67-1.5-1.5S9.17 5 10 5s1.5.67 1.5 1.5S10.83 8 10 8Zm4-1c-.83 0-1.5-.67-1.5-1.5S13.17 4 14 4s1.5.67 1.5 1.5S14.83 7 14 7Zm3 4c-.83 0-1.5-.67-1.5-1.5S16.17 8 17 8s1.5.67 1.5 1.5S17.83 11 17 11Z" />
            </svg>
            <span id="theme_label">Light</span>
        </button>
    </div>

    <section>
        <h2 id="story_title" contenteditable="true"></h2>

        <div class="prompt-row">
            <h3 id="story_prompt"></h3>
            <button id="regenerate_prompt" type="button" title="Prompt is locked once you begin writing.">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6"/>
                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                    <path d="M3 22v-6h6"/>
                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                </svg>
            </button>
        </div>

        <textarea id="story_editor" placeholder="You may begin writing..."></textarea>

        <div class="actions">
            <button id="exit_session">Exit</button>
            <button id="save_story">Save</button>
            <div id="save_status">
                <span id="save_icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M8 12.5l2.5 2.5L16 9.5"/>
                    </svg>
                </span>
                <span id="save_text"></span>
            </div>
            
            <div class="download">
                <button id="download_story">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                </button>

                <div id="download_menu">
                    <button id="txt_download">TXT</button>
                    <button id="pdf_download">PDF</button>
                </div>
            </div>
        </div>
    </section>

    <script src="js/ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
    <script type="module" src="js/writing.js"></script>
</body>
</html>
