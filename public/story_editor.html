<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title"></title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/story_editor.css">
</head>
<body>
    <div class="renshu-layout">
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2></h2>
                <h2>Menu</h2>
                <button id="sidebar-toggle" class="sidebar-toggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <path d="M0 0h25v24H0z" fill="none" />
                        <path fill="currentColor" d="M3.563 6a.75.75 0 0 1 .75-.75h16a.75.75 0 0 1 0 1.5h-16a.75.75 0 0 1-.75-.75m0 12a.75.75 0 0 1 .75-.75h16a.75.75 0 0 1 0 1.5h-16a.75.75 0 0 1-.75-.75m.75-6.75a.75.75 0 0 0 0 1.5h16a.75.75 0 0 0 0-1.5z" />
                    </svg>
                </button>
            </div>


            <div id="home-toggle" class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
                    <path d="M0 0h24v24H0z" fill="none" />
	                <g fill="none" fill-rule="evenodd">
		                <path d="m12.593 23.258l-.011.002l-.071.035l-.02.004l-.014-.004l-.071-.035q-.016-.005-.024.005l-.004.01l-.017.428l.005.02l.01.013l.104.074l.015.004l.012-.004l.104-.074l.012-.016l.004-.017l-.017-.427q-.004-.016-.017-.018m.265-.113l-.013.002l-.185.093l-.01.01l-.003.011l.018.43l.005.012l.008.007l.201.093q.019.005.029-.008l.004-.014l-.034-.614q-.005-.018-.02-.022m-.715.002a.02.02 0 0 0-.027.006l-.006.014l-.034.614q.001.018.017.024l.015-.002l.201-.093l.01-.008l.004-.011l.017-.43l-.003-.012l-.01-.01z" />

	                </g>
                </svg>
                <span id="home-label">Home</span>
            </div>
        
            <div id="community-toggle" class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
                    <path d="M0 0h24v24H0z" fill="none" />
	                <g fill="none">
		                <path d="m12.594 23.258l-.012.002l-.071.035l-.02.004l-.014-.004l-.071-.036q-.016-.004-.024.006l-.004.01l-.017.428l.005.02l.01.013l.104.074l.015.004l.012-.004l.104-.074l.012-.016l.004-.017l-.017-.427q-.004-.016-.016-.018m.264-.113l-.014.002l-.184.093l-.01.01l-.003.011l.018.43l.005.012l.008.008l.201.092q.019.005.029-.008l.004-.014l-.034-.614q-.005-.019-.02-.022m-.715.002a.02.02 0 0 0-.027.006l-.006.014l-.034.614q.001.018.017.024l.015-.002l.201-.093l.01-.008l.003-.011l.018-.43l-.003-.012l-.01-.01z" />

	                </g>
                </svg>
                <span id="community-label">Community</span>
            </div>

            <div id="theme-toggle" class="sidebar-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 32 32">
	                <path d="M0 0h32v32H0z" fill="none" />

                </svg>
                <span id="theme-label">Dark</span>
            </div>
        </div>

        <div id="container" class="content-container">
            <div class="writing-workspace">
                <div class="workspace-header">
                    <button id="back-button" class="back-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
                            <path d="M0 0h24v24H0z" fill="none" />
	                        <path fill="currentColor" d="M16.62 2.99a1.25 1.25 0 0 0-1.77 0L6.54 11.3a.996.996 0 0 0 0 1.41l8.31 8.31c.49.49 1.28.49 1.77 0s.49-1.28 0-1.77L9.38 12l7.25-7.25c.48-.48.48-1.28-.01-1.76" />
                        </svg>
                    </button>

                    <h2 id="story-title" class="story-title" contenteditable="true"></h2>

                    <button id="settings-toggle" class="settings-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <path fill="currentColor" d="m19.44 12.99l-.01.02c.04-.33.08-.67.08-1.01s-.03-.66-.07-.99l.01.02l2.44-1.92l-2.43-4.22l-2.87 1.16l.01.01c-.52-.4-1.09-.74-1.71-1h.01L14.44 2H9.57l-.44 3.07h.01c-.62.26-1.19.6-1.71 1l.01-.01l-2.88-1.17l-2.44 4.22l2.44 1.92l.01-.02c-.04.33-.07.65-.07.99s.03.68.08 1.01l-.01-.02l-2.1 1.65l-.33.26l2.43 4.2l2.88-1.15l-.02-.04c.53.41 1.1.75 1.73 1.01h-.03L9.58 22h4.85s.03-.18.06-.42l.38-2.65h-.01c.62-.26 1.2-.6 1.73-1.01l-.02.04l2.88 1.15l2.43-4.2s-.14-.12-.33-.26zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5s3.5 1.57 3.5 3.5s-1.57 3.5-3.5 3.5" />
                        </svg>
                    </button>

                    <div id="story-settings" class="story-settings">
                        <div class="story-settings-item">
                            <label>Genre</label>
                            <select id="genre" class="genre">
                                <option value="">None</option>
                            </select>
                        </div>

                        <div class="story-settings-item">
                            <label>Mode</label>
                            <div id="story-type-toggle" class="story-type-toggle">
                                <button id="solo-toggle" class="story-type active">Solo</button>
                                <button id="collaborative-toggle"class="story-type">Collaborative</button>
                            </div>
                        </div>

                        <div class="story-settings-item">
                            <label>Prompt</label>
                            <div class="prompt-type-toggle">
                                <button class="prompt-type active" data-type="none">None</button>
                                <button class="prompt-type" data-type="template">Template</button>
                                <button class="prompt-type" data-type="challenge">Challenge</button>
                                <button class="prompt-type" data-type="community">Community</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="story-prompt" class="workspace-prompt" hidden>
                    <h3 id="prompt-text"></h3>
                    <button id="regenerate-prompt" type="button" title="Prompt is locked once you begin writing." style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
	                        <path d="M0 0h24v24H0z" fill="none" />
	                        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
		                        <path d="M20.5 8c-1.392-3.179-4.823-5-8.522-5C7.299 3 3.453 6.552 3 11.1" />
		                        <path d="M16.489 8.4h3.97A.54.54 0 0 0 21 7.86V3.9M3.5 16c1.392 3.179 4.823 5 8.522 5c4.679 0 8.525-3.552 8.978-8.1" />
		                        <path d="M7.511 15.6h-3.97a.54.54 0 0 0-.541.54v3.96" />
	                        </g>
                        </svg>
                    </button>
                </div>

                <div class="workspace-editor">
                    <textarea id="story-content" class="story-content" placeholder="You may begin writing..."></textarea>
                </div>

                <div class="workspace-footer">
                    <div class="actions">
                        <button id="save-story">Save</button>
                        <div id="save-status">
                            <span id="save-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="9"/>
                                    <path d="M8 12.5l2.5 2.5L16 9.5"/>
                                </svg>
                            </span>
                            <span id="save-text"></span>
                        </div>
            
                        <div class="download">
                            <button id="download-story">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                            </button>

                            <div id="download-menu">
                                <button id="txt-download">TXT</button>
                                <button id="pdf-download">PDF</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/scripts/utils/ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
    <script type="module" src="/scripts/story_editor/story_editor.js"></script>
</body>
</html>
